# Project information
site_name: VectorBT
site_description: Python library for backtesting and analyzing trading strategies at scale
site_author: Oleg Polakow
site_url: https://vectorbt.dev/

# Repository
repo_name: vectorbt
repo_url: https://github.com/polakowo/vectorbt
edit_uri: ""

# Copyright
copyright: Copyright &copy; 2017-2026 Oleg Polakow. All rights reserved.

# Configuration
theme:
  name: material
  custom_dir: overrides
  include_search_page: false
  search_index_only: true
  language: en
  features:
    - navigation.tracking
    - navigation.indexes
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.share
    - content.code.copy
  palette:
    scheme: default
    primary: indigo
    accent: blue
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo/logo-white.svg
  favicon: /assets/logo/favicon.png
  sponsor: "https://github.com/sponsors/polakowo"

# Customization
markdown_extensions:
  - meta
  - admonition
  - def_list
  - md_in_html
  - attr_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.progressbar
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: polakowo
      repo: vectorbt
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      extend_pygments_lang:
        - name: pycon3
          lang: pycon
          options:
            python3: true
  - pymdownx.tasklist:
      custom_checkbox: true
extra:
  analytics:
    provider: google
    property: G-4QLCS0J048
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/polakowo
extra_javascript:
  - assets/javascripts/extra.js
extra_css:
  - assets/stylesheets/extra.css

# Plugins
plugins:
  - search
  - minify:
      minify_html: true

# Validation
validation:
  absolute_links: ignore

# Page tree
nav:
  - Getting started:
      - index.md
      - Features: getting-started/features.md
      - Installation: getting-started/installation.md
      - Usage: getting-started/usage.md
      - Resources: getting-started/resources.md
      - Contributing: getting-started/contributing.md
  - API: []
  - Terms:
      - terms/index.md
      - License: terms/license.md
