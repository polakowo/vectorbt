name: Docker

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
      prerelease:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build. Defaults to the workflow ref."
        required: false
        type: string
      prerelease:
        description: "Skip latest tags."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  IMAGE_NAME: vectorbt

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            vbt_extras: ""
            tag_suffix: ""
            latest_tag: latest

          - variant: rust
            vbt_extras: "rust"
            tag_suffix: "-rust"
            latest_tag: latest-rust

          - variant: full
            vbt_extras: "full"
            tag_suffix: "-full"
            latest_tag: latest-full

          - variant: full-rust
            vbt_extras: "full,rust"
            tag_suffix: "-full-rust"
            latest_tag: latest-full-rust

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1
          fetch-tags: true
          filter: blob:none

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) - ${{ matrix.variant }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag,suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{version}}${{ matrix.tag_suffix }}
            type=raw,value=${{ matrix.latest_tag }},enable=${{ !inputs.prerelease }}

      - name: Build and push (multi-arch) - ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VBT_EXTRAS=${{ matrix.vbt_extras }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
